<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>VestibuLab</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->

  <aside class="sidebar">
    <h2 class="logo">VestibuLab</h2>


<nav>
  <button class="nav-item active" data-page="painel">
  <span class="material-symbols-outlined">dashboard</span>
  Painel
</button>

<button class="nav-item" data-page="rendimento">
  <span class="material-symbols-outlined">trending_up</span>
  Rendimento
</button>

<button class="nav-item" data-page="timer">
  <span class="material-symbols-outlined">timer</span>
  Cronômetro
</button>

<button class="nav-item" data-page="calendario">
  <span class="material-symbols-outlined">calendar_month</span>
  Calendário
</button>

<button class="nav-item" data-page="revisoes">
  <span class="material-symbols-outlined">refresh</span>
  Revisões
</button>

<button class="nav-item" data-page="provas">
  <span class="material-symbols-outlined">quiz</span>
  Provas
</button>
</nav>


  </aside>

  <!-- CONTEÚDO -->

  <main class="content">


<!-- PAINEL -->
<section id="painel" class="page active">
  
  <h1>Painel Geral</h1>

  <div class="cards">
    <div class="card"><p>Rendimento Médio</p><h2 id="avgPerf">--</h2></div>
    <div class="card"><p>Total Estudado</p><h2 id="totalHours">0h</h2></div>
    <div class="card"><p>Revisões Pendentes</p><h2 id="pendingReviews">0</h2></div>
    <div class="card"><p>Provas Feitas</p><h2 id="totalExams">0</h2></div>
  </div>

  <div class="panel-box">
    <h3>⚠️ Pontos Fracos</h3>
    <div id="weakPoints">Nenhum dado ainda</div>
  </div>

  <div class="panel-box">
    <h3>📅 Próximas Revisões</h3>
    <div id="nextReviews">Nenhuma revisão</div>
  </div>
</section>

<!-- RENDIMENTO -->
<section id="rendimento" class="page">
  <h1>🎯 Registrar Rendimento</h1>

  <form id="formPerformance">
    <input type="text" id="subject" placeholder="Matéria">
    <input type="text" id="content" placeholder="Conteúdo">
    <input type="number" id="total" placeholder="Total de questões">
    <input type="number" id="correct" placeholder="Acertos">
    <button type="submit">Salvar</button>
  </form>

  <div id="performanceList"></div>
</section>

<!-- TIMER -->
<section id="timer" class="page">
  <h1>⏱ Cronômetro</h1>
  <div id="timerDisplay">25:00</div>
  <button id="startTimer">Iniciar</button>
</section>


  </main>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
